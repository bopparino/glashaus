# GlasHaus pre-commit configuration.
#
# Two stages are wired:
#   - commit (default): format, lint, fast tests. Must stay fast.
#   - pre-push:         full test suite. Slower but blocks bad pushes.
#
# Install both with:
#   uv run pre-commit install --hook-type pre-commit --hook-type pre-push
#
# See docs/SETUP_HOOKS.md for the longer story.

default_language_version:
  python: python3.12

default_install_hook_types: [pre-commit, pre-push]

repos:
  # --- generic hygiene ---------------------------------------------------
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v5.0.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-toml
      - id: check-added-large-files
        args: [--maxkb=500]
      - id: check-merge-conflict
      - id: detect-private-key
      - id: mixed-line-ending
        args: [--fix=lf]

  # --- ruff: format + lint ----------------------------------------------
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.4
    hooks:
      - id: ruff-format
      - id: ruff
        args: [--fix, --exit-non-zero-on-fix]

  # --- local hooks: mypy, fast tests on commit, full suite on push ----
  #
  # mypy runs as a local hook (not via mirrors-mypy) so it uses the project
  # venv and can see the installed `glashaus` package. The isolated-env
  # variant only works when every changed commit happens to also stage
  # the relevant src/ files — fine for greenfield commits, silently
  # broken for test-only follow-ups. Local-hook semantics match CI exactly.
  - repo: local
    hooks:
      - id: mypy
        name: mypy (strict, project venv)
        entry: uv run mypy
        language: system
        pass_filenames: false
        stages: [pre-commit]
        # No `types: [python]` — mypy reads `files = [...]` from pyproject
        # and we want the hook to run whenever any Python file changes.
        types_or: [python, pyi]

      - id: pytest-fast
        name: pytest (fast, excludes 'slow')
        entry: uv run pytest -q -m "not slow"
        language: system
        pass_filenames: false
        stages: [pre-commit]
        types: [python]

      - id: pytest-full
        name: pytest (full suite, runs on push)
        entry: uv run pytest -q
        language: system
        pass_filenames: false
        stages: [pre-push]
        always_run: true
